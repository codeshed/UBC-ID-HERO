<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hero Video</title>

  <style>
    html, body {
      margin: 0;

      height: 100%;

    .hero {

    </video>
  </section>
</body>
</html>
